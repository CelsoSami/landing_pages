<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#06060e"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0066aa"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e8d5b7"/>
      <stop offset="100%" stop-color="#aa8855"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="0" y2="1" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#aa3333"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Grid lines -->
  <g opacity="0.1" stroke="#00d4ff">
    <line x1="0" y1="100" x2="800" y2="100" stroke-dasharray="4 8"/>
    <line x1="0" y1="180" x2="800" y2="180" stroke-dasharray="4 8"/>
    <line x1="0" y1="260" x2="800" y2="260" stroke-dasharray="4 8"/>
    <line x1="0" y1="340" x2="800" y2="340" stroke-dasharray="4 8"/>
  </g>
  <!-- Title -->
  <text x="400" y="48" text-anchor="middle" font-family="Inter, sans-serif" font-size="26" font-weight="700" fill="#ffffff" letter-spacing="2">BRASIL DASHBOARD</text>
  <text x="400" y="75" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#00d4ff" letter-spacing="4">SEGURANÇA PÚBLICA 2024</text>
  <!-- Bar Chart -->
  <g filter="url(#glow)">
    <!-- Bars with varying heights representing different states -->
    <rect x="80" y="200" width="40" height="160" rx="3" fill="url(#bar1)" opacity="0.9"/>
    <rect x="140" y="150" width="40" height="210" rx="3" fill="url(#bar1)" opacity="0.8"/>
    <rect x="200" y="110" width="40" height="250" rx="3" fill="url(#bar3)" opacity="0.9"/>
    <rect x="260" y="180" width="40" height="180" rx="3" fill="url(#bar1)" opacity="0.7"/>
    <rect x="320" y="140" width="40" height="220" rx="3" fill="url(#bar2)" opacity="0.9"/>
    <rect x="380" y="100" width="40" height="260" rx="3" fill="url(#bar3)" opacity="1"/>
    <rect x="440" y="170" width="40" height="190" rx="3" fill="url(#bar1)" opacity="0.6"/>
    <rect x="500" y="130" width="40" height="230" rx="3" fill="url(#bar2)" opacity="0.8"/>
    <rect x="560" y="190" width="40" height="170" rx="3" fill="url(#bar1)" opacity="0.5"/>
    <rect x="620" y="160" width="40" height="200" rx="3" fill="url(#bar2)" opacity="0.7"/>
  </g>
  <!-- Trend line -->
  <polyline points="100,220 160,190 220,160 280,170 340,130 400,100 460,150 520,120 580,160 640,140"
    stroke="#00d4ff" stroke-width="2" fill="none" filter="url(#glow)" opacity="0.8"/>
  <!-- Data points on trend line -->
  <g fill="#00d4ff" filter="url(#glow)">
    <circle cx="100" cy="220" r="4"/>
    <circle cx="160" cy="190" r="4"/>
    <circle cx="220" cy="160" r="4"/>
    <circle cx="280" cy="170" r="4"/>
    <circle cx="340" cy="130" r="4"/>
    <circle cx="400" cy="100" r="5"/>
    <circle cx="460" cy="150" r="4"/>
    <circle cx="520" cy="120" r="4"/>
    <circle cx="580" cy="160" r="4"/>
    <circle cx="640" cy="140" r="4"/>
  </g>
  <!-- Stats boxes -->
  <rect x="600" y="60" width="170" height="80" rx="8" fill="#0d0d1f" stroke="#00d4ff" stroke-width="1" opacity="0.8"/>
  <text x="685" y="90" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="28" font-weight="700" fill="#00d4ff" filter="url(#glow)">44.127</text>
  <text x="685" y="115" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#e8d5b7">mortes violentas</text>
  <!-- Axis labels -->
  <g font-family="JetBrains Mono, monospace" font-size="10" fill="#666">
    <text x="100" y="385" text-anchor="middle">2012</text>
    <text x="160" y="385" text-anchor="middle">2013</text>
    <text x="220" y="385" text-anchor="middle">2015</text>
    <text x="280" y="385" text-anchor="middle">2017</text>
    <text x="340" y="385" text-anchor="middle">2019</text>
    <text x="400" y="385" text-anchor="middle">2021</text>
    <text x="460" y="385" text-anchor="middle">2022</text>
    <text x="520" y="385" text-anchor="middle">2023</text>
    <text x="580" y="385" text-anchor="middle">2024</text>
  </g>
  <!-- Bottom attribution -->
  <text x="400" y="430" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#444">Fonte: FBSP · Anuário 2025 · Dados 2024</text>
  <!-- Decorative elements -->
  <rect x="20" y="60" width="3" height="120" rx="1.5" fill="#00d4ff" opacity="0.3"/>
  <rect x="777" y="200" width="3" height="120" rx="1.5" fill="#e8d5b7" opacity="0.3"/>
</svg>
